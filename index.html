<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wind2Rise Oy</title>
    <style>
        :root {
            --bg-color: #0f1115;
            --text-color: #ffffff;
            --muted-color: #748094;
            --accent-color: #00a8ff;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            justify-content: space-between;
            padding: 3rem 2rem;
        }

        header {
            max-width: 1000px;
            width: 100%;
            margin: 0 auto;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: -0.03em;
        }

        .logo span {
            color: var(--accent-color);
        }

        main {
            max-width: 1000px;
            width: 100%;
            margin: auto auto;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            margin-bottom: 1rem;
            line-height: 1.2;
        }

        p {
            font-size: 1.15rem;
            color: var(--muted-color);
            max-width: 500px;
            margin-bottom: 2.5rem;
        }

        .contact-link {
            font-size: 1.25rem;
            color: var(--text-color);
            text-decoration: none;
            font-weight: 600;
            border-bottom: 2px solid var(--accent-color);
            padding-bottom: 4px;
            transition: color 0.2s ease, border-color 0.2s ease;
        }

        .contact-link:hover {
            color: var(--accent-color);
        }

        footer {
            max-width: 1000px;
            width: 100%;
            margin: 0 auto;
            font-size: 0.85rem;
            color: var(--muted-color);
            display: flex;
            justify-content: space-between;
            border-top: 1px solid #1e242f;
            padding-top: 2rem;
        }

        @media (max-width: 600px) {
            h1 { font-size: 2rem; }
            footer { flex-direction: column; gap: 1rem; }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">Wind2Rise<span>.</span></div>
    </header>

    <main>
        <h1>Industrial & Technical Solutions.</h1>
        <p>Providing professional consultation, machinery procurement, and operational support services.</p>
        <a href="mailto:info@wind2rise.fi" class="contact-link">info@wind2rise.fi</a>
    </main>

    <footer>
        <div>Wind2Rise Oy</div>
        <div>&copy; 2026 Wind2Rise Oy. All rights reserved.</div>
    </footer>

</body>
</html>
